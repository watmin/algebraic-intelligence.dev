<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Algebraic Intelligence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 0.5em;
      background: linear-gradient(135deg, #7eb8ff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1.15rem;
      color: #888;
      max-width: 36em;
      line-height: 1.6;
    }

    .status {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: #555;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    .status span {
      color: #4ade80;
    }
  </style>
</head>
<body>
  <main>
    <h1>Algebraic Intelligence</h1>
    <p>The Holon project — holographic memory systems, algebraic encoders, and adaptive network defense.</p>
    <div class="status"><span>&#x25cf;</span> live</div>
  </main>
</body>
</html>
